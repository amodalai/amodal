<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23C2410C'/%3E%3Cpolygon points='16,3 6,20 16,27' fill='white'/%3E%3Cpolyline points='16,3 26,20 16,27' fill='none' stroke='white' stroke-width='1.2' stroke-linejoin='miter'/%3E%3Cline x1='16' y1='3' x2='16' y2='27' stroke='white' stroke-width='1.2'/%3E%3C/svg%3E" />
  </head>
  <body>
    <script>
      // Apply theme before React mounts to prevent light-mode flash
      (function(){var s=localStorage.getItem('studio-theme');
      if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme:dark)').matches))
      document.documentElement.classList.add('dark')})();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
