<html lang="en">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CclipPath id='sq'%3E%3Crect x='2' y='10' width='17' height='17' rx='3'/%3E%3C/clipPath%3E%3C/defs%3E%3Crect x='2' y='10' width='17' height='17' rx='3' fill='%231E40AF'/%3E%3Ccircle cx='22' cy='11' r='10' fill='%2360A5FA' fill-opacity='0.85'/%3E%3Ccircle cx='22' cy='11' r='10' fill='%233B82F6' clip-path='url(%23sq)'/%3E%3C/svg%3E" />

  <body>
    <script>
      // Apply theme before React mounts to prevent light-mode flash
      (function(){var s=localStorage.getItem('studio-theme');
      if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme:dark)').matches))
      document.documentElement.classList.add('dark')})();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
