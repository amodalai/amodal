name: Smoke Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-smoke:
    name: Eval Provider
    if: "!contains(github.event.head_commit.message, '[skip smoke]')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm --filter @amodalai/core run build
      - name: Run eval smoke test
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: pnpm --filter @amodalai/core run test:smoke

  runtime-smoke:
    name: Runtime
    if: "!contains(github.event.head_commit.message, '[skip smoke]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: amodal_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=5s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm --filter @amodalai/db --filter @amodalai/core --filter @amodalai/runtime run build
      - name: Run runtime smoke test
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DATABASE_URL: postgresql://postgres@localhost:5432/amodal_test
          SMOKE_TARGET: google
        run: pnpm --filter @amodalai/runtime run test:smoke
