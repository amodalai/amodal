name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # On push to main: create/update the "Version Packages" PR via changesets.
  # When that PR merges, changesets publishes to npm and we create a GitHub Release.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: pnpm changeset:version
          publish: pnpm changeset:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release if any packages were published.
      # Read version from core's package.json (all published packages share the same version).
      # Check npm to confirm it was actually published before tagging.
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/core/package.json', 'utf-8'));
            const version = pkg.version;
            const tag = `v${version}`;

            // Check if this version was actually published to npm
            const resp = await fetch(`https://registry.npmjs.org/@amodalai/core/${version}`);
            if (!resp.ok) {
              console.log(`@amodalai/core@${version} not on npm, skipping release`);
              return;
            }

            // Check if tag already exists
            try {
              await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` });
              console.log(`Tag ${tag} already exists, skipping`);
              return;
            } catch (e) {
              // Tag doesn't exist, create it
            }

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });

            console.log(`Created release ${tag}`);

  # Manual snapshot releases for testing pre-release builds
  snapshot:
    if: github.event_name == 'workflow_dispatch'
    name: Release snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - name: Publish snapshot
        continue-on-error: true
        run: |
          snapshot=$(git branch --show-current | tr -cs '[:alnum:]-' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-$//')
          pnpm changeset version --no-git-tag --snapshot "$snapshot"
          pnpm changeset publish --no-git-tag --snapshot "$snapshot" --tag "$snapshot"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
