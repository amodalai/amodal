name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # On push to main: create/update the "Version Packages" PR via changesets.
  # When that PR merges, changesets publishes to npm and we create a GitHub Release.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: pnpm changeset:version
          publish: pnpm changeset:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release after changesets runs.
      # We read the version from package.json directly instead of relying on
      # changesets' published output, which can be unreliable with --no-git-tag.
      - name: Create GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/core/package.json', 'utf8'));
            const version = pkg.version;
            const tag = `v${version}`;

            // Check if release already exists
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Release ${tag} already exists, skipping`);
              return;
            } catch (e) {
              // Release doesn't exist, create it
            }

            // Create tag if needed
            try {
              await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` });
              console.log(`Tag ${tag} already exists`);
            } catch (e) {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              console.log(`Created tag ${tag}`);
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });

            console.log(`Created release ${tag}`);

  # Post-publish smoke test — install from npm and verify it works
  npm-smoke-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: npm smoke test
    runs-on: ubuntu-latest
    needs: [release]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: amodal
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=5s --health-timeout=5s --health-retries=5
    steps:
      - name: Install from npm
        run: npm install -g @amodalai/amodal@latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create test agent
        run: |
          mkdir -p /tmp/smoke-agent
          echo '{"name":"ci-smoke","version":"1.0.0","models":{"main":{"provider":"anthropic","model":"claude-sonnet-4-20250514"}}}' > /tmp/smoke-agent/amodal.json

      - name: Start amodal dev
        run: |
          cd /tmp/smoke-agent
          DATABASE_URL=postgresql://localhost:5432/amodal amodal dev &
          # Wait for both runtime and Studio to start
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3847/health > /dev/null 2>&1 && \
               curl -sf http://localhost:3848/api/studio/config > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Verify endpoints
        run: |
          set -e
          echo "--- Runtime health ---"
          curl -sf http://localhost:3847/health
          echo ""
          echo "--- Studio config ---"
          curl -sf http://localhost:3848/api/studio/config | jq .
          echo "--- Studio SPA ---"
          test "$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3848/)" = "200"
          echo "--- Studio stores ---"
          curl -sf http://localhost:3848/api/studio/stores | jq .
          echo "--- Studio drafts ---"
          curl -sf http://localhost:3848/api/studio/drafts | jq .
          echo "All checks passed"

  # Manual snapshot releases for testing pre-release builds
  snapshot:
    if: github.event_name == 'workflow_dispatch'
    name: Release snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      - name: Publish snapshot
        continue-on-error: true
        run: |
          snapshot=$(git branch --show-current | tr -cs '[:alnum:]-' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-$//')
          pnpm changeset version --no-git-tag --snapshot "$snapshot"
          pnpm changeset publish --no-git-tag --snapshot "$snapshot" --tag "$snapshot"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
