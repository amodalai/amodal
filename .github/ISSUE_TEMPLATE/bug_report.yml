name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Amodal are you using?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What is happening?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
    validations:
      required: false
  - type: input
    id: repo
    attributes:
      label: Reproduction repo
      description: Link to a minimal reproduction repository, if applicable
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information (logs, screenshots, environment details)
    validations:
      required: false
